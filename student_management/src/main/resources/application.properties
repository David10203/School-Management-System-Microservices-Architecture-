spring.application.name=student_management

spring.datasource.url=jdbc:mysql://localhost:3306/student_db
spring.datasource.username=root
spring.datasource.password=123456789

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8083
logging.file.name=logs/app.log

# Root level (console can stay default)
logging.level.root=INFO

# Only log INFO and WARN (ignore DEBUG & TRACE)
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Your application logs (keep INFO)
logging.level.com.school.studentservice=INFO

# Cleaner format
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %msg%n

# عنوان سيرفر كافكا (غالباً بيكون كدة لو شغال لوكال)
spring.kafka.bootstrap-servers=localhost:9092

# إعدادات الـ Producer (المرسل - academicservice)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# إعدادات الـ Consumer (المستقبل - student_management)
spring.kafka.consumer.group-id=school-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=com.academicservice.demo.DTOS.events.EnrollmentEvent:com.student_managment_service.student_management.dto.events.EnrollmentEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*